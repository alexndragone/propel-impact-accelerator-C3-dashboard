<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Outreach Impact Accelerator</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg:#f2f2f4;
    --card:#ffffff;
    --ink:#1f2430;
    --sub:#6b7280;
    --orange:#e8a06e;
    --orange-dark:#d97b3e;
    --blue:#3348a8;
    --track:#ececec;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    font-family:'Helvetica Neue', Arial, sans-serif;
    color:var(--ink);
    padding:24px 28px 48px;
  }
  .chart{
    display:flex;
    flex-direction:column;
  }
  .row-block{
    padding:18px 0 20px;
    border-bottom:1px solid #e2e2e2;
  }
  .row-block:last-child{ border-bottom:none; }
  .email-name{
    font-weight:700;
    font-size:15px;
    color:var(--ink);
  }
  .email-name a{
    color:var(--ink);
    text-decoration:underline;
    text-decoration-color:#d8d8d8;
    text-underline-offset:4px;
  }
  .email-name a:hover{
    color:var(--orange-dark);
    text-decoration-color:var(--orange-dark);
  }
  .pending{
    color:var(--orange-dark);
    font-size:12px;
    font-weight:600;
    margin-left:8px;
    text-decoration:none;
  }
  .subject{
    color:#374151;
    font-weight:600;
    font-size:13px;
    margin-top:6px;
  }
  .subject .label, .preview .label{
    font-weight:700;
    color:var(--sub);
    margin-right:4px;
  }
  .preview{
    color:var(--sub);
    font-size:12.5px;
    margin-top:2px;
    margin-bottom:12px;
    line-height:1.4;
  }
  .bar-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-top:6px;
  }
  .bar-track{
    flex:1;
    height:24px;
    background:var(--track);
    border-radius:4px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:4px 0 0 4px;
    transition:width 0.4s ease;
  }
  .bar-fill.orange{background:var(--orange);}
  .bar-fill.blue{background:var(--blue);}
  .bar-pct{
    font-size:13.5px;
    font-weight:600;
    width:40px;
    text-align:right;
    color:var(--ink);
  }
  .loading{
    color:var(--sub);
    font-size:13px;
    padding:20px;
  }
</style>
</head>
<body>

<div id="chart" class="chart">
  <div class="loading">Cargando datos…</div>
</div>

<script>
  // 1. Reemplaza esta URL por la de tu Google Sheet publicada como CSV
  //    (Archivo -> Compartir -> Publicar en la web -> pestaña "Outreach" -> formato CSV)
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQYJJmI49fYtxeAN3Zc6Be0V26X9Q5BfRTO34gZ20xVccZDM-stdcyKVe9av7lZjMsFE9MqaisILHnV/pub?gid=305284483&single=true&output=csv";

  function pct(value) {
    if (value === "" || value === null || value === undefined) return null;
    const cleaned = String(value).replace("%", "").trim();
    if (cleaned === "" || isNaN(cleaned)) return null;
    const n = parseFloat(cleaned);
    // Soporta tanto 0.45 (fracción) como 45 (ya en %)
    return n <= 1 ? n * 100 : n;
  }

  function render(rows) {
    const container = document.getElementById("chart");
    container.innerHTML = "";

    // Ordena por fecha de envío
    rows.sort((a, b) => new Date(a["Fecha envío"]) - new Date(b["Fecha envío"]));

    rows.forEach(row => {
      const openPct = pct(row["Open Rate"]);
      const clickPct = pct(row["Click Rate"]);
      const isSent = openPct !== null;

      const block = document.createElement("div");
      block.className = "row-block";

      const pendingTag = !isSent
        ? `<span class="pending">programado ${row["Fecha envío"] || ""}</span>`
        : "";

      const link = row["Link"] || "#";
      const nameHtml = `<a href="${link}" target="_blank" rel="noopener">${row["Campaña"] || ""}</a>`;

      block.innerHTML = `
        <div class="email-name">${nameHtml}${pendingTag}</div>
        <div class="subject"><span class="label">Subject:</span>${isSent ? (row["Subject Line"] || "") : "—"}</div>
        <div class="preview"><span class="label">Preview text:</span>${isSent ? (row["Preview text"] || "") : "—"}</div>
        <div class="bar-row">
          <div class="bar-track"><div class="bar-fill orange" style="width:${openPct ?? 0}%"></div></div>
          <div class="bar-pct">${openPct !== null ? openPct.toFixed(0) + "%" : "—"}</div>
        </div>
        <div class="bar-row">
          <div class="bar-track"><div class="bar-fill blue" style="width:${clickPct ?? 0}%"></div></div>
          <div class="bar-pct">${clickPct !== null ? clickPct.toFixed(0) + "%" : "—"}</div>
        </div>
      `;
      container.appendChild(block);
    });
  }

  Papa.parse(CSV_URL, {
    download: true,
    header: true,
    skipEmptyLines: true,
    complete: (results) => render(results.data),
    error: (err) => {
      document.getElementById("chart").innerHTML =
        `<div class="loading">Error cargando datos: ${err}</div>`;
    }
  });
</script>

</body>
</html>
